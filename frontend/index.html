<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Dev Card Generator</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-black text-white min-h-screen flex items-center justify-center p-4">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [username, setUsername] = useState("");
            const [card, setCard] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState("");

            const generate = async () => {
                if (!username.trim()) {
                    setError("Please enter a username");
                    return;
                }
                
                setLoading(true);
                setError("");
                try {
                    const res = await fetch('https://github-card-backend-552916810993.us-central1.run.app/generate/' + username);
                    const data = await res.json();
                    
                    if (data.rank === "ERROR") {
                        setError(data.stats || "User not found");
                        setCard(null);
                    } else {
                        setCard(data);
                    }
                } catch (err) {
                    setError("Failed to fetch GitHub user. Please try again.");
                    setCard(null);
                } finally {
                    setLoading(false);
                }
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter') {
                    generate();
                }
            };

            return (
                <div className="w-full max-w-2xl">
                    <div className="p-8 bg-gray-800/50 backdrop-blur-sm rounded-2xl shadow-2xl border border-gray-700 mb-6">
                        <h1 className="text-4xl font-bold mb-6 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent text-center">
                            GitHub Dev Card
                        </h1>
                        <input 
                            value={username} 
                            onChange={(e) => setUsername(e.target.value)}
                            onKeyPress={handleKeyPress}
                            className="w-full p-3 mb-4 bg-gray-700/50 rounded-lg border border-gray-600 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition text-white placeholder-gray-400"
                            placeholder="Enter GitHub Username"
                        />
                        <button 
                            onClick={generate}
                            disabled={loading}
                            className="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 p-3 rounded-lg font-semibold transition disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                            {loading ? "Searching..." : "Generate Card"}
                        </button>
                        {error && (
                            <div className="mt-4 p-3 bg-red-500/20 border border-red-500/50 rounded-lg text-red-300 text-sm">
                                {error}
                            </div>
                        )}
                    </div>

                    {card && !error && (
                        <div className="p-8 bg-gradient-to-b from-gray-800/80 to-gray-900/80 backdrop-blur-sm rounded-2xl border border-blue-500/30 shadow-2xl">
                            {/* Header with Avatar */}
                            <div className="flex items-center gap-4 mb-6">
                                {card.avatar_url && (
                                    <img 
                                        src={card.avatar_url} 
                                        alt={card.username}
                                        className="w-16 h-16 rounded-full border-2 border-blue-500"
                                    />
                                )}
                                <div className="flex-1">
                                    <h2 className="text-2xl font-bold text-white">{card.name || card.username}</h2>
                                    <p className="text-gray-400">@{card.username}</p>
                                </div>
                            </div>

                            {/* Bio */}
                            {card.bio && (
                                <p className="text-gray-300 text-sm mb-4 italic">"{card.bio}"</p>
                            )}

                            {/* Rank and Stats */}
                            <div className="grid grid-cols-3 gap-4 mb-6">
                                <div className="bg-gray-700/50 rounded-lg p-3 text-center border border-gray-600">
                                    <div className="text-2xl font-black text-blue-400">{card.rank}</div>
                                    <div className="text-xs text-gray-400 mt-1">Rank</div>
                                </div>
                                <div className="bg-gray-700/50 rounded-lg p-3 text-center border border-gray-600">
                                    <div className="text-2xl font-bold text-green-400">{card.followers}</div>
                                    <div className="text-xs text-gray-400 mt-1">Followers</div>
                                </div>
                                <div className="bg-gray-700/50 rounded-lg p-3 text-center border border-gray-600">
                                    <div className="text-2xl font-bold text-purple-400">{card.repos}</div>
                                    <div className="text-xs text-gray-400 mt-1">Repos</div>
                                </div>
                            </div>

                            {/* Languages */}
                            {card.languages && card.languages.length > 0 && (
                                <div className="mb-6">
                                    <h3 className="text-sm font-semibold text-gray-300 mb-2">Languages</h3>
                                    <div className="flex flex-wrap gap-2">
                                        {card.languages.map((lang, idx) => (
                                            <span key={idx} className="px-3 py-1 bg-blue-500/30 border border-blue-500/50 rounded-full text-xs font-medium text-blue-300">
                                                {lang}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* Top Projects */}
                            {card.top_projects && card.top_projects.length > 0 && (
                                <div>
                                    <h3 className="text-sm font-semibold text-gray-300 mb-3">TOP PROJECTS</h3>
                                    <div className="space-y-2">
                                        {card.top_projects.map((project, idx) => (
                                            <div key={idx} className="bg-gray-700/30 border border-gray-600/50 rounded-lg p-3 hover:border-blue-500/50 transition">
                                                <div className="flex justify-between items-start gap-2">
                                                    <div className="flex-1">
                                                        <a 
                                                            href={project.url} 
                                                            target="_blank" 
                                                            rel="noopener noreferrer"
                                                            className="text-blue-400 font-semibold hover:text-blue-300 transition"
                                                        >
                                                            {project.name}
                                                        </a>
                                                        {project.language && (
                                                            <span className="ml-2 text-xs text-gray-400">{project.language}</span>
                                                        )}
                                                    </div>
                                                    <div className="text-yellow-400 font-semibold text-sm flex items-center gap-1">
                                                        ★ {project.stars}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
